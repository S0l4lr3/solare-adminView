name: Frontend Admin CI - TestRail Reporting

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, mysql, zip, bcmath
        coverage: none

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Prepare Environment
      run: |
        cp .env.example .env
        php artisan key:generate

    - name: Run Tests and Generate JUnit Report
      run: php artisan test --log-junit report.xml

    - name: Install TestRail CLI
      run: pip install trcli

    - name: Report Results to TestRail
      if: always()
      run: |
        trcli -y \
          -h ${{ secrets.TEST_RAIL_DOMAIN }} \
          -u ${{ secrets.TEST_RAIL_EMAIL }} \
          -p ${{ secrets.TEST_RAIL_KEY }} \
          parse_junit \
          --project "Frontend Admin Solare" \
          --run-name "Frontend Admin Push - ${{ github.ref_name }} (${{ github.sha }})" \
          -f report.xml
